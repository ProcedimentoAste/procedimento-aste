<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Pannello Admin — Procedimento Aste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1A1F36; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loader { text-align: center; color: #fff; }
    .loader-logo { width: 64px; height: 64px; background: #7B8FE8; border-radius: 16px; margin: 0 auto 20px; position: relative; overflow: hidden; animation: breathe 2s ease-in-out infinite; }
    .loader-logo::before { content: ''; position: absolute; width: 100%; height: 40%; background: #B8963E; top: 10%; transform: skewY(-10deg); }
    .loader-logo::after { content: ''; position: absolute; width: 100%; height: 35%; background: #C0392B; top: 38%; transform: skewY(-10deg); }
    @keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.96)} }
    .loader h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .loader p { font-size: 14px; color: rgba(255,255,255,.5); }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(123,143,232,0.3); border-top-color: #7B8FE8; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-logo"></div>
    <h2>Procedimento Aste</h2>
    <p>Caricamento pannello di gestione...</p>
    <div class="spinner"></div>
  </div>

  <!-- Netlify Identity Widget — DEVE stare in questa pagina -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
      }, 1500);
    });
  </script>
</body>
</html>
