backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "annunci"
    label: "Annunci Immobili"
    label_singular: "Annuncio"
    folder: "content/annunci"
    create: true
    slug: "{{slug}}"
    identifier_field: "titolo"
    fields:
      - label: "Pubblica annuncio"
        name: "pubblicato"
        widget: "boolean"
        default: true
      - label: "Tipologia"
        name: "tipologia"
        widget: "select"
        options:
          - "Residenziale"
          - "Commerciale"
          - "Ufficio"
          - "Terreno"
          - "Garage"
      - label: "Sottotipologia"
        name: "sottotipologia"
        widget: "string"
      - label: "Titolo annuncio"
        name: "titolo"
        widget: "string"
      - label: "Indirizzo"
        name: "indirizzo"
        widget: "string"
      - label: "Citta"
        name: "citta"
        widget: "string"
      - label: "Provincia"
        name: "provincia"
        widget: "string"
        default: "AR"
      - label: "CAP"
        name: "cap"
        widget: "string"
        required: false
      - label: "Offerta minima (euro)"
        name: "offerta_minima"
        widget: "number"
      - label: "Descrizione"
        name: "descrizione"
        widget: "text"
      - label: "Foto copertina"
        name: "foto_copertina"
        widget: "image"
        required: false
      - label: "In evidenza"
        name: "in_evidenza"
        widget: "boolean"
        default: false
